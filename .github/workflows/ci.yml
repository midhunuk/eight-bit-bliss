name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clippy
        run: rustup component add clippy

      - name: Build
        run: cargo build --verbose

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --verbose
